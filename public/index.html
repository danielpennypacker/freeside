<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b140d" />
    <meta name="description" content="Freeside — a run-from-the-page D&D adventure." />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
    <!-- Free SIL OFL display fonts for the adventure-book chrome. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:wght@500;600;700&display=swap"
    />
    <script type="module" src="/app.js"></script>
    <title>Freeside</title>
  </head>
  <body>
    <header class="topbar">
      <h1><a href="/">free<span>side</span></a></h1>
      <nav class="topnav">
        <a href="/#book" data-nav="book">Adventure</a>
        <a href="/#sessions" data-nav="sessions">Game sessions</a>
      </nav>
      <div class="userslot" id="userslot"></div>
    </header>

    <main>
      <noscript>Freeside needs JavaScript to run.</noscript>
      <!-- Top-level Web Component: routes between the DM book, the session console, and the player view. -->
      <freeside-app></freeside-app>
    </main>

    <footer>
      <small>
        Freeside is an original homebrew tabletop adventure. Built on Cloudflare
        Workers + D1 with native Web Components.
      </small>
    </footer>
  </body>
</html>
